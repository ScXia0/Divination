services:
  - type: web
    name: divination-daily
    runtime: python
    buildCommand: echo "No build step required"
    startCommand: python server.py
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: OPENAI_REASONING_EFFORT
        value: medium
